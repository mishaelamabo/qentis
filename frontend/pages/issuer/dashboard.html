<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Issuer Dashboard — Qentis</title>
  <link href="../../assets/css/issuer/dashboard.css" rel="stylesheet"/>
</head>
<body data-role="ISSUER" data-sidebar="issuer" data-page="dashboard">

<script src="../../assets/js/api/config.js"></script>
<script src="../../assets/js/api/auth.js"></script>
<script src="../../assets/js/api/items.js"></script>
<script src="../../assets/js/layout.js"></script>
<script src="../../assets/js/init.js"></script>

<main class="q-main">
  <div class="q-page-header">
    <h1>Dashboard</h1>
    <p>Overview of your registered items and recent activity</p>
  </div>

  <div class="q-stat-grid">
    <div class="q-stat">
      <div class="q-stat-icon q-stat-icon--gold">📄</div>
      <div class="q-stat-value" id="stat-total">—</div>
      <div class="q-stat-label">Total items registered</div>
    </div>
    <div class="q-stat">
      <div class="q-stat-icon q-stat-icon--green">✓</div>
      <div class="q-stat-value" id="stat-verified">—</div>
      <div class="q-stat-label">Verified this month</div>
    </div>
    <div class="q-stat">
      <div class="q-stat-icon q-stat-icon--red">⚠</div>
      <div class="q-stat-value" id="stat-alerts">—</div>
      <div class="q-stat-label">Fraud alerts</div>
    </div>
    <div class="q-stat">
      <div class="q-stat-icon q-stat-icon--mint">⛓</div>
      <div class="q-stat-value" id="stat-blockchain">—</div>
      <div class="q-stat-label">Blockchain records</div>
    </div>
  </div>

  <div class="q-card">
    <div class="q-card-header">
      <div class="q-card-title q-card-title--no-margin">Recent registrations</div>
      <a href="my-items.html" class="link-sm">View all →</a>
    </div>
    <div id="recent-items-loading" class="q-loading-state">
      <div class="q-spinner loading-spinner"></div>
      <div>Loading items...</div>
    </div>
    <div class="q-table-wrap">
      <table class="q-table" id="recent-items-table" style="display:none;">
        <thead>
          <tr>
            <th>Item</th>
            <th>Category</th>
            <th>Registered</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="recent-items-body"></tbody>
      </table>
    </div>
    <div id="recent-items-empty" class="q-empty-state" style="display:none;">
      <div class="q-empty-icon">📦</div>
      <p>No items registered yet.</p>
      <a href="register-item.html" class="btn-q-primary">Register your first item</a>
    </div>
  </div>
</main>

<script src="../../assets/js/issuer/dashboard.js"></script>
</body>
</html>
