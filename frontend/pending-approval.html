<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pending Approval  Qentis</title>
  <link href="assets/css/login.css" rel="stylesheet"/>
</head>
<body>

<nav class="q-navbar">
  <a href="index.html" class="q-logo">Qen<span>tis</span></a>
</nav>

<div class="q-auth-split" style="min-height: calc(100vh - 60px); margin-top: 60px;">
  <main class="q-auth-main" style="width: 100%;">
    <div class="q-auth-card" style="text-align: center; max-width: 480px;">

      <div style="font-size: 56px; margin-bottom: 16px;">⏳</div>

      <div style="
        display: inline-block;
        background: rgba(240,192,64,.15);
        color: #F0C040;
        border: 1px solid rgba(240,192,64,.3);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: .5px;
        text-transform: uppercase;
        margin-bottom: 20px;
      ">Under review</div>

      <h2 style="font-size: 22px; margin-bottom: 12px;">Account pending approval</h2>

      <p style="color: var(--q-text-muted); font-size: 14px; line-height: 1.7; margin-bottom: 12px;">
        Your issuer registration has been submitted successfully. A Qentis administrator will review your documents and approve your account within 24–48 hours.
      </p>

      <p style="color: var(--q-text-muted); font-size: 13px; margin-bottom: 28px;">
        You will receive an email notification once approved.
      </p>

      <a href="login.html" class="btn-q-outline" style="display: inline-block;">
        ← Back to sign in
      </a>

    </div>
  </main>
</div>

</body>
</html>
