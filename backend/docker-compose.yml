version: '3.9'

services:

  # ── DATABASES ──────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: qentis
      POSTGRES_PASSWORD: qentis2026
      POSTGRES_DB: qentis_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - qentis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qentis -d qentis_main"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - qentis_network

  ganache:
    image: trufflesuite/ganache:latest
    container_name: ganache
    ports:
      - "8545:8545"
    command: >
      --deterministic
      --accounts 10
      --host 0.0.0.0
      --port 8545
      --networkId 1337
      --db /data
    networks:
      - qentis_network
    volumes:
      - ganache_data:/data
    restart: unless-stopped

  # ── SERVICES ───────────────────────────────────
  user-auth:
    build: ./services/user-auth
    container_name: user-auth
    ports:
      - "8001:8001"
    environment:
      - SECRET_KEY=qentis-secret-key-2026
      - DEBUG=True
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=*
      - JWT_ACCESS_TOKEN_LIFETIME_MINUTES=60
      - JWT_REFRESH_TOKEN_LIFETIME_DAYS=7
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - qentis_network
    volumes:
      - ./services/user-auth:/app
    restart: unless-stopped

  institution:
    build: ./services/institution
    container_name: institution
    ports:
      - "8002:8002"
    environment:
      - SECRET_KEY=qentis-secret-key-2026
      - DEBUG=True
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/1
      - AUTH_SERVICE_URL=http://user-auth:8001
      - ALLOWED_HOSTS=*
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - qentis_network
    volumes:
      - ./services/institution:/app
    restart: unless-stopped

  item-registration:
    build: ./services/item-registration
    container_name: item-registration
    ports:
      - "8003:8003"
    environment:
      - SECRET_KEY=qentis-secret-key-2026
      - DEBUG=True
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/2
      - AUTH_SERVICE_URL=http://user-auth:8001
      - BLOCKCHAIN_SERVICE_URL=http://blockchain:8004
      - OUTPUT_SERVICE_URL=http://auth-output:8005
      - INSTITUTION_SERVICE_URL=http://institution:8002
      - ALLOWED_HOSTS=*
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      user-auth:
        condition: service_started
    networks:
      - qentis_network
    volumes:
      - ./services/item-registration:/app
    restart: unless-stopped

  blockchain:
    build: ./services/blockchain
    container_name: blockchain
    ports:
      - "8004:8004"
    environment:
      - SECRET_KEY=qentis-secret-key-2026
      - DEBUG=True
      - DB_HOST=postgres
      - ALLOWED_HOSTS=*
      - GANACHE_URL=http://ganache:8545
      - CONTRACT_ADDRESS=0xe78A0F7E598Cc8b0Bb87894B0F60dD2a88d6a8Ab
      - DEPLOYER_PRIVATE_KEY=0xd980fc1392d2fddce18279a75775416c9f4f6070bddd38d2d1f496e34193c05f
    depends_on:
      postgres:
        condition: service_healthy
      ganache:
        condition: service_started
    networks:
      - qentis_network
    volumes:
      - ./services/blockchain:/app
    restart: unless-stopped

  auth-output:
    build: ./services/auth-output
    container_name: auth-output
    ports:
      - "8005:8005"
    environment:
      - SECRET_KEY=qentis-secret-key-2026
      - DEBUG=True
      - DB_HOST=postgres
      - ALLOWED_HOSTS=*
      - AUTH_SERVICE_URL=http://user-auth:8001
      - BLOCKCHAIN_SERVICE_URL=http://blockchain:8004
      - MEDIA_ROOT=/app/media
    depends_on:
      postgres:
        condition: service_healthy
      blockchain:
        condition: service_started
    networks:
      - qentis_network
    volumes:
      - ./services/auth-output:/app
      - auth_output_media:/app/media
    restart: unless-stopped

  verification:
    build: ./services/verification
    container_name: verification
    ports:
      - "8006:8006"
    environment:
      - SECRET_KEY=qentis-secret-key-2026
      - DEBUG=True
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/4
      - BLOCKCHAIN_SERVICE_URL=http://blockchain:8004
      - OUTPUT_SERVICE_URL=http://auth-output:8005
      - AUTH_SERVICE_URL=http://user-auth:8001
      - EMAIL_HOST=smtp.mailtrap.io
      - EMAIL_PORT=2525
      - EMAIL_HOST_USER=your_mailtrap_user
      - EMAIL_HOST_PASSWORD=your_mailtrap_password
      - FRAUD_THRESHOLD=50
      - CACHE_TTL=300
      - ALLOWED_HOSTS=*
      - ITEM_SERVICE_URL=http://item-registration:8003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - qentis_network
    volumes:
      - ./services/verification:/app
    restart: unless-stopped

  admin-analytics:
    build: ./services/admin-analytics
    container_name: admin-analytics
    ports:
      - "8007:8007"
    environment:
      - SECRET_KEY=qentis-secret-key-2026
      - DEBUG=True
      - DB_HOST=postgres
      - ALLOWED_HOSTS=*
      - AUTH_SERVICE_URL=http://user-auth:8001
      - INSTITUTION_SERVICE_URL=http://institution:8002
      - ITEM_SERVICE_URL=http://item-registration:8003
      - VERIFICATION_SERVICE_URL=http://verification:8006
      - FRAUD_THRESHOLD=50
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qentis_network
    volumes:
      - ./services/admin-analytics:/app
    restart: unless-stopped

networks:
  qentis_network:
    driver: bridge

volumes:
  postgres_data:
  auth_output_media:
  ganache_data:
